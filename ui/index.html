<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoStream AI — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22d3a0;
    --text: #e8eaf2;
    --muted: #7c8499;
    --user-bubble: #6c63ff;
    --agent-bubble: #1c2030;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrapper {
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 4px;
  }

  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header-text h1 {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header-text p {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 1px;
  }

  .status-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Chat container */
  .chat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 460px;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-track { background: transparent; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user  { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }
  .avatar.agent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: var(--font-head);
  }
  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .bubble {
    max-width: 68%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.6;
    font-weight: 400;
  }
  .msg-row.agent .bubble {
    background: var(--agent-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    color: #fff;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex; gap: 5px; align-items: center; padding: 4px 2px;
  }
  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* Lead status card */
  .lead-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .lead-card-title {
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .lead-fields {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .lead-field {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    transition: all 0.3s ease;
  }
  .lead-field.filled {
    border-color: var(--green);
    color: var(--green);
  }
  .lead-field .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .lead-field.filled .dot { background: var(--green); box-shadow: 0 0 5px var(--green); }

  /* Input area */
  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14.5px;
    padding: 13px 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 13px 24px;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  button:hover { opacity: 0.9; transform: scale(1.02); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 14px;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover {
    color: var(--accent2);
    border-color: var(--accent);
    background: var(--surface);
    transform: none;
  }

  /* Success flash */
  .success-banner {
    padding: 14px 20px;
    background: rgba(34, 211, 160, 0.08);
    border: 1px solid var(--green);
    border-radius: var(--radius-sm);
    color: var(--green);
    font-size: 13.5px;
    display: none;
    gap: 10px;
    align-items: center;
    animation: fadeUp 0.4s ease forwards;
  }
  .success-banner.show { display: flex; }

  .server-note {
    font-size: 11.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  .server-note a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">🎬</div>
    <div class="header-text">
      <h1>AutoStream AI</h1>
      <p>Social-to-Lead Agent · Powered by Gemini 1.5 Flash + LangGraph</p>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      Live demo
    </div>
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="lead-card">
    <div class="lead-card-title">Lead Collection Progress</div>
    <div class="lead-fields">
      <div class="lead-field" id="f-name"><span class="dot"></span> Name</div>
      <div class="lead-field" id="f-email"><span class="dot"></span> Email</div>
      <div class="lead-field" id="f-platform"><span class="dot"></span> Platform</div>
    </div>
  </div>

  <div class="success-banner" id="success-banner">
    <span>✅</span>
    <span id="success-text">Lead captured! Check the server terminal for output.</span>
  </div>

  <div class="quick-btns">
    <button class="quick-btn" onclick="sendQuick('Hi!')">👋 Hi there</button>
    <button class="quick-btn" onclick="sendQuick('What plans do you offer?')">💰 Pricing</button>
    <button class="quick-btn" onclick="sendQuick('Tell me about the Pro plan')">⭐ Pro plan</button>
    <button class="quick-btn" onclick="sendQuick('I want to sign up for the Pro plan for my YouTube channel')">🚀 Sign me up</button>
    <button class="quick-btn" onclick="resetSession()">🔄 Reset</button>
  </div>

  <div class="input-row">
    <input
      type="text"
      id="msg-input"
      placeholder="Type a message…"
      onkeydown="if(event.key==='Enter') sendMessage()"
      autocomplete="off"
    />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>


</div>

<script>
const API = 'http://localhost:8000';
let SESSION_ID = 'demo-' + Math.random().toString(36).slice(2, 8);
let isLoading = false;

const chat = document.getElementById('chat');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

function addMsg(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'agent' ? 'A' : 'U';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;

  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.id = 'typing';

  const av = document.createElement('div');
  av.className = 'avatar agent';
  av.textContent = 'A';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function updateLeadFields(collected) {
  ['name','email','platform'].forEach(k => {
    const el = document.getElementById(`f-${k}`);
    if (collected[k]) {
      el.classList.add('filled');
      el.querySelector('.dot').insertAdjacentHTML('afterend', ` <strong>${collected[k]}</strong>`);
      el.lastChild.previousSibling.remove(); // remove old text node
      // update label
      el.childNodes[1].textContent = ` ${collected[k]}`;
    }
  });

  // Check if all three are filled → show success
  if (collected.name && collected.email && collected.platform) {
    const banner = document.getElementById('success-banner');
    document.getElementById('success-text').textContent =
      `✅ Lead captured: ${collected.name} · ${collected.email} · ${collected.platform}`;
    banner.classList.add('show');
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  isLoading = true;
  sendBtn.disabled = true;

  addMsg('user', text);
  showTyping();

  try {
    const res = await fetch(`${API}/webhook`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: SESSION_ID }),
    });

    removeTyping();

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    addMsg('agent', data.response || 'No response.');
    updateLeadFields(data.collected || {});

  } catch (err) {
    removeTyping();
    addMsg('agent', `⚠️ Could not reach the server. Make sure FastAPI is running on port 8000.\n\nError: ${err.message}`);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function sendQuick(msg) {
  input.value = msg;
  sendMessage();
}

function resetSession() {
  SESSION_ID = 'demo-' + Math.random().toString(36).slice(2, 8);
  chat.innerHTML = '';
  document.getElementById('success-banner').classList.remove('show');
  ['name','email','platform'].forEach(k => {
    const el = document.getElementById(`f-${k}`);
    el.classList.remove('filled');
    el.innerHTML = `<span class="dot"></span> ${k.charAt(0).toUpperCase() + k.slice(1)}`;
  });
  addMsg('agent', 'Session reset! Start a fresh conversation.');
}

// Initial welcome
addMsg('agent', 'Hey! I\'m AutoStream\'s AI assistant. I can tell you about our plans, features, or help you get started. What can I do for you today?');
input.focus();
</script>
</body>
</html>
